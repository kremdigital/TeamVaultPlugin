# Release workflow — triggered by pushing a `v*` tag.
#
# Builds `main.js` from source and publishes a GitHub release with the
# three Obsidian-required artifacts: `main.js`, `manifest.json`,
# `styles.css` (the plugin doesn't currently ship custom CSS, but
# Obsidian's release-uploader looks for the file regardless — we attach
# an empty stub so the upload doesn't 404).
#
# Bump `manifest.json#version` on `main`, commit, then:
#   git tag v0.1.0 && git push origin v0.1.0

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sanity gates
        run: |
          pnpm typecheck
          pnpm lint
          pnpm format:check
          pnpm test

      - name: Build
        run: pnpm build

      - name: Touch styles.css
        run: |
          if [ ! -f styles.css ]; then
            echo "/* obsidian-sync — no custom styles in v${{ github.ref_name }} */" > styles.css
          fi

      - name: Validate manifest version matches tag
        run: |
          tag="${GITHUB_REF#refs/tags/v}"
          manifest=$(node -p "require('./manifest.json').version")
          if [ "$tag" != "$manifest" ]; then
            echo "Manifest version ($manifest) does not match tag ($tag)" >&2
            exit 1
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Obsidian Team ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: |
            main.js
            manifest.json
            styles.css
